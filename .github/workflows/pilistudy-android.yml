name: PiliStudy Android APK

on:
  push:
    branches:
      - feature/pilistudy-student-edition
      - main
  workflow_dispatch:

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.4'
          cache: true

      - name: Apply Android patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug --android-project-arg dev=1 --pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiliStudy-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
